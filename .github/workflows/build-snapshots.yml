name: Build Packages (master)

on:
  push:
    branches: [ master ]

jobs:
  build:
    uses: ./.github/workflows/package-build.yml

  publish:
    name: Publish snapshot release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/
          merge-multiple: true

      - name: Publish snapshot release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          gh release delete snapshot --yes --cleanup-tag 2>/dev/null || true
          gh release create snapshot packages/* \
            --title "Snapshot (master@${SHORT_SHA:0:7})" \
            --notes "Automated snapshot build from the master branch. Built from commit \`${SHORT_SHA:0:7}\`." \
            --prerelease
