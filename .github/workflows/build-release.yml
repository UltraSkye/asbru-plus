name: Build Packages (release)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/package-build.yml

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" packages/* \
            --title "asbru-plus $TAG" \
            --generate-notes
