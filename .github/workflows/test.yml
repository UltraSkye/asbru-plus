name: Tests

on:
  push:
    branches: [ master, build-test ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            perl \
            libtest-exception-perl \
            libgtk3-perl \
            gir1.2-gtk-3.0 \
            gir1.2-vte-2.91 \
            gir1.2-wnck-3.0 \
            libvte-2.91-0 \
            libexpect-perl \
            libyaml-perl \
            libcrypt-cbc-perl \
            libcrypt-blowfish-perl \
            libglib-perl \
            libcairo-perl \
            libpango-perl \
            libxml-parser-perl \
            libnet-arp-perl \
            libuuid-tiny-perl \
            libcrypt-rijndael-perl \
            libgtk3-simplelist-perl \
            libsocket6-perl \
            shellcheck \
            xvfb \
            x11-utils

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1024x768x24 -ac &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          # Wait until Xvfb is ready (up to 10 seconds)
          for i in $(seq 1 10); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run packaging consistency tests
        run: perl t/02-packaging.t

      - name: Run critical fix verification tests
        run: perl t/03-critical-fixes.t

      - name: Run shellcheck tests
        run: perl t/04-shellcheck.t

      - name: Run workflow lint tests
        run: perl t/05-workflow-lint.t

      - name: Run unit tests
        run: perl t/01-utils-functions.t

      - name: Run syntax check
        run: perl t/00-syntax.t

      - name: Run dark mode tests
        run: perl t/06-dark-mode.t

      - name: Run extended utils tests
        run: perl t/07-utils-extended.t

      - name: Run crypto roundtrip tests
        run: perl t/08-crypto.t

      - name: Run variable substitution tests
        run: perl t/09-subst.t

      - name: Run Wayland support tests
        run: perl t/10-wayland.t

  shellcheck-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: ShellCheck ci/build_package.sh
        run: shellcheck --severity=error ci/build_package.sh

      - name: ShellCheck docker scripts
        run: |
          shellcheck --severity=error docker/build-deb/test.sh
          shellcheck --severity=error docker/build-rpm/test.sh
          shellcheck --severity=error docker/test/entrypoint.sh
