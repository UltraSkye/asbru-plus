name: Tests

on:
  push:
    branches: [ master, build-test ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            perl \
            libtest-exception-perl \
            libgtk3-perl \
            gir1.2-gtk-3.0 \
            gir1.2-vte-2.91 \
            gir1.2-wnck-3.0 \
            libvte-2.91-0 \
            libexpect-perl \
            libyaml-perl \
            libcrypt-cbc-perl \
            libcrypt-blowfish-perl \
            libglib-perl \
            libcairo-perl \
            libpango-perl \
            libxml-parser-perl \
            libnet-arp-perl \
            libossp-uuid-perl \
            libcrypt-rijndael-perl \
            libgtk3-simplelist-perl \
            shellcheck \
            xvfb

      - name: Run packaging consistency tests
        run: perl t/02-packaging.t

      - name: Run critical fix verification tests
        run: perl t/03-critical-fixes.t

      - name: Run shellcheck tests
        run: perl t/04-shellcheck.t

      - name: Run workflow lint tests
        run: perl t/05-workflow-lint.t

      - name: Run unit tests (with virtual display)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          perl t/01-utils-functions.t

      - name: Run syntax check (with virtual display)
        run: |
          export DISPLAY=:99
          perl t/00-syntax.t

      - name: Run dark mode tests
        run: perl t/06-dark-mode.t

  shellcheck-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck ci/build_package.sh
        run: shellcheck --severity=error ci/build_package.sh

      - name: ShellCheck docker scripts
        run: |
          shellcheck --severity=error docker/build-deb/test.sh
          shellcheck --severity=error docker/build-rpm/test.sh
          shellcheck --severity=error docker/test/entrypoint.sh
