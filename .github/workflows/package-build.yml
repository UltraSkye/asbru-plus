name: Package Build (Reusable)

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian stable
          - os: debian
            dist: bullseye
            package: deb

          - os: debian
            dist: bookworm
            package: deb

          # Debian testing — may fail on packpack image availability
          - os: debian
            dist: trixie
            package: deb
            experimental: true

          # Ubuntu LTS
          - os: ubuntu
            dist: jammy
            package: deb
            repack_deb: "yes"

          - os: ubuntu
            dist: noble
            package: deb
            repack_deb: "yes"

          # Enterprise Linux
          - os: el
            dist: "8"
            package: rpm

          # AlmaLinux 9 (modern EL9 rebuild)
          - os: almalinux
            dist: "9"
            package: rpm

          # Fedora — packpack publishes fedora-39 as the latest available image.
          # Fedora 40+ images are not yet in packpack; fedora-39 is used until then.
          - os: fedora
            dist: "39"
            package: rpm
            experimental: true

    env:
      PRODUCT: "asbru-plus"
      OS: ${{ matrix.os }}
      DIST: ${{ matrix.dist }}
      PACKAGE: ${{ matrix.package }}
      DOCKER_REPO: ""
      DOCKER_IMAGE: ""
      REPACK_DEB: ${{ matrix.repack_deb || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git devscripts debhelper quilt \
            python3 python3-pip gpgv

      - name: Make build script executable
        run: chmod +x ci/build_package.sh

      - name: Build package
        run: ci/build_package.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.os }}-${{ matrix.dist }}-${{ matrix.package }}"
          path: build/*
          if-no-files-found: warn
