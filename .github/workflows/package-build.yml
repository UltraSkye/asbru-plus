name: Package Build (Reusable)

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian
            dist: bullseye
            package: deb

          - os: debian
            dist: bookworm
            package: deb

          - os: debian
            dist: trixie
            package: deb

          - os: ubuntu
            dist: jammy
            package: deb
            repack_deb: "yes"

          - os: ubuntu
            dist: noble
            package: deb
            repack_deb: "yes"

          - os: el
            dist: "8"
            package: rpm

          - os: fedora
            dist: "43"
            package: rpm

    env:
      PRODUCT: "asbru-plus"
      OS: ${{ matrix.os }}
      DIST: ${{ matrix.dist }}
      PACKAGE: ${{ matrix.package }}
      DOCKER_REPO: ""
      DOCKER_IMAGE: ""
      REPACK_DEB: ${{ matrix.repack_deb || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git devscripts debhelper quilt \
            python3 python3-pip gpgv

      - name: Make build script executable
        run: chmod +x ci/build_package.sh

      - name: Build packages
        run: ci/build_package.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.os }}-${{ matrix.dist }}-${{ matrix.package }}"
          path: build/*
          if-no-files-found: warn
